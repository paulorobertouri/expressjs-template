name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Require JWT secret
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "Repository secret JWT_SECRET is not set. Set it in Settings → Secrets."
            exit 1
          fi
          if [ ${#JWT_SECRET} -lt 32 ]; then
            echo "JWT_SECRET must be at least 32 characters long."
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Test (with coverage)
        run: pnpm run test -- --coverage
